apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
  labels:
    app.kubernetes.io/name: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backstage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backstage
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: backstage
          image: ghcr.io/ashikuroff/backstage:sha-d48df75e8bc7133d91e167278a241460eaaf6015
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7007
              name: http
          env:
            - name: APP_BASE_URL
              value: http://localhost:7007
            - name: NODE_ENV
              value: production
            - name: AUTH_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: backstage-auth
                  key: github_client_id
            - name: AUTH_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backstage-auth
                  key: github_client_secret
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: backstage-data
              mountPath: /var/backstage
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: backstage-data
          persistentVolumeClaim:
            claimName: backstage-data
        - name: tmp
          emptyDir: {}
