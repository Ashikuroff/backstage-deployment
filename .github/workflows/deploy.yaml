name: deploy

on:
  push:
    branches:
      - main
      - feature-main
    paths:
      - backstage/**
      - argocd-app.yaml
      - k8s/**
      - .github/workflows/deploy.yaml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: backstage-deploy
  cancel-in-progress: true

jobs:
  build-and-update-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: backstage/yarn.lock

      - name: Install Backstage dependencies
        working-directory: backstage
        run: node .yarn/releases/yarn-4.4.1.cjs install --immutable

      - name: Run Tests
        working-directory: backstage
        run: node .yarn/releases/yarn-4.4.1.cjs test:all

      - name: Build Backstage backend bundle
        working-directory: backstage
        run: |
          node .yarn/releases/yarn-4.4.1.cjs tsc
          node .yarn/releases/yarn-4.4.1.cjs build:backend

      - name: Compute image coordinates
        id: image
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/backstage"
          TAG="sha-${GITHUB_SHA}"
          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backstage image
        uses: docker/build-push-action@v6
        with:
          context: backstage
          file: backstage/packages/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.image }}:latest

      - name: Update Kubernetes deployment image
        env:
          IMAGE: ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}
        run: |
          sed -i "s|image: .*|image: ${IMAGE}|" k8s/deployment.yaml

      - name: Commit GitOps manifest update
        run: |
          if git diff --quiet -- k8s/deployment.yaml; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update Backstage image to ${{ steps.image.outputs.tag }} [skip ci]"
          git push



      - name: Deploy Kubernetes Objects (if cluster accessible)
        run: |
          if [ -n "${{ secrets.KUBECONFIG }}" ]; then
            mkdir -p ~/.kube
            echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          fi
          
          if ! kubectl config get-contexts kind-kind-1cp-1worker > /dev/null 2>&1; then
             echo "======================================================================"
             echo "NOTICE: The GitHub Action runner cannot access your local Mac's Kind cluster"
             echo "because it is running in GitHub's isolated cloud environment."
             echo "To deploy to your local desktop, run these commands manually on your Mac:"
             echo "  kubectl create namespace argocd"
             echo "  kubectl apply --server-side -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml"
             echo "  kubectl apply -f argocd-app.yaml"
             echo "======================================================================"
             exit 0
          fi
          
          echo "Cluster is accessible! Deploying..."
          kubectl config use-context kind-kind-1cp-1worker
          kubectl create namespace argocd || true
          kubectl apply --server-side -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          kubectl wait --for=condition=Available deployment/argocd-server -n argocd --timeout=300s
          kubectl wait --for=condition=Available deployment/argocd-repo-server -n argocd --timeout=300s
          kubectl wait --for=jsonpath='{.status.readyReplicas}'=1 statefulset/argocd-application-controller -n argocd --timeout=300s
          
          kubectl apply -f argocd-app.yaml
          sleep 60
          kubectl get application -n argocd backstage || true
          kubectl get pods -n backstage || true
          kubectl get pods -A
