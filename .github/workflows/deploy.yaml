name: deploy

on:
  push:
    branches:
      - main
      - feature-main
    paths:
      - backstage/**
      - argocd-app.yaml
      - k8s/**
      - .github/workflows/deploy.yaml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: backstage-deploy
  cancel-in-progress: true

jobs:
  build-and-update-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: backstage/yarn.lock

      - name: Install Backstage dependencies
        working-directory: backstage
        run: node .yarn/releases/yarn-4.4.1.cjs install --immutable

      - name: Run Tests
        working-directory: backstage
        run: node .yarn/releases/yarn-4.4.1.cjs test:all

      - name: Build Backstage backend bundle
        working-directory: backstage
        run: |
          node .yarn/releases/yarn-4.4.1.cjs tsc
          node .yarn/releases/yarn-4.4.1.cjs build:backend

      - name: Compute image coordinates
        id: image
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/backstage"
          TAG="sha-${GITHUB_SHA}"
          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backstage image
        uses: docker/build-push-action@v6
        with:
          context: backstage
          file: backstage/packages/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.image }}:latest

      - name: Update Kubernetes deployment image
        env:
          IMAGE: ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}
        run: |
          sed -i "s|image: .*|image: ${IMAGE}|" k8s/deployment.yaml

      - name: Commit GitOps manifest update
        run: |
          if git diff --quiet -- k8s/deployment.yaml; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update Backstage image to ${{ steps.image.outputs.tag }} [skip ci]"
          git push


