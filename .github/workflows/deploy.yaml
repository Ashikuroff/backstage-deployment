name: deploy

on:
  push:
    branches:
      - main
      - feature-main
    paths:
      - backstage/**
      - argocd-app.yaml
      - k8s/**
      - .github/workflows/deploy.yaml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: backstage-deploy
  cancel-in-progress: true

jobs:
  build-and-update-manifest:
    runs-on: [self-hosted, kind-runner]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Backstage dependencies
        working-directory: backstage
        run: node .yarn/releases/yarn-4.4.1.cjs install --immutable

      - name: Run Tests
        working-directory: backstage
        run: node .yarn/releases/yarn-4.4.1.cjs test:all

      - name: Build Backstage backend bundle
        working-directory: backstage
        run: |
          node .yarn/releases/yarn-4.4.1.cjs tsc
          node .yarn/releases/yarn-4.4.1.cjs build:backend

      - name: Compute image coordinates
        id: image
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/${OWNER}/backstage"
          TAG="sha-${GITHUB_SHA}"
          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backstage image
        uses: docker/build-push-action@v6
        with:
          context: backstage
          file: backstage/packages/backend/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.image }}:latest
          # Workaround for transient 502 errors
          retry: 3

      - name: Update Kubernetes deployment image
        env:
          IMAGE: ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}
        run: |
          sed -i "s|image: .*|image: ${IMAGE}|" k8s/deployment.yaml

      - name: Commit GitOps manifest update
        run: |
          if git diff --quiet -- k8s/deployment.yaml; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: update Backstage image to ${{ steps.image.outputs.tag }} [skip ci]"
          git push

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Apply GitHub auth secret
        env:
          GITHUB_CLIENT_ID: ${{ secrets.AUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.AUTH_GITHUB_CLIENT_SECRET }}
        run: |
          # Ensure the backstage namespace exists and apply a secret with GitHub OAuth credentials
          kubectl create namespace backstage --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic backstage-auth \
            --from-literal=github_client_id="${GITHUB_CLIENT_ID}" \
            --from-literal=github_client_secret="${GITHUB_CLIENT_SECRET}" \
            -n backstage --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Kubernetes Objects
        run: |
          # If KUBECONFIG is provided (e.g. local testing), use it. 
          # Otherwise, kubectl will use the in-cluster service account.
          if [ -n "${{ secrets.KUBECONFIG }}" ]; then
            mkdir -p ~/.kube
            echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
            kubectl config use-context kind-kind-1cp-1worker
          fi
          
          kubectl create namespace argocd || true
          kubectl apply --server-side -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          kubectl wait --for=condition=Available deployment/argocd-server -n argocd --timeout=300s
          kubectl wait --for=condition=Available deployment/argocd-repo-server -n argocd --timeout=300s
          kubectl wait --for=jsonpath='{.status.readyReplicas}'=1 statefulset/argocd-application-controller -n argocd --timeout=300s
          
          kubectl apply -f argocd-app.yaml
          sleep 60
          kubectl get application -n argocd backstage || true
          kubectl get pods -n backstage || true
          kubectl get pods -A
